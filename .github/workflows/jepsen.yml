name: Jepsen Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jepsen:
    name: Jepsen Correctness Tests
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build release binary
        run: cargo build --release --features full

      - name: Install Leiningen (Clojure)
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein > /usr/local/bin/lein
          chmod +x /usr/local/bin/lein
          lein version

      - name: Start Jepsen cluster
        run: docker compose -f docker-compose.jepsen.yml up -d
        working-directory: .

      - name: Wait for cluster health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9094/health > /dev/null 2>&1; then
              echo "Cluster healthy"
              break
            fi
            sleep 2
          done

      - name: Run Jepsen tests
        run: |
          cd tests/jepsen
          lein test 2>&1 | tee jepsen-results.txt
        continue-on-error: true

      - name: Check for linearizability violations
        id: check
        run: |
          if grep -q "FAIL" tests/jepsen/jepsen-results.txt 2>/dev/null; then
            echo "violations=true" >> "$GITHUB_OUTPUT"
            echo "::error::Jepsen test failures detected"
          else
            echo "violations=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Jepsen results
        uses: actions/upload-artifact@v4
        with:
          name: jepsen-results-${{ github.sha }}
          path: |
            tests/jepsen/jepsen-results.txt
            tests/jepsen/store/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.jepsen.yml down -v

      - name: Fail on violations
        if: steps.check.outputs.violations == 'true'
        run: exit 1
